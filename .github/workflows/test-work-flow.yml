name: Test Windows VM Connection

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ master ]  # Optional: test on push to master

jobs:
  test-connection:
    runs-on: windows-latest   # Must be Windows to use Invoke-Command
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Test VM connection
        shell: pwsh
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PASS: ${{ secrets.VM_PASS }}
        run: |
          $secpasswd = ConvertTo-SecureString $env:VM_PASS -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($env:VM_USER, $secpasswd)

          # Run a simple command on the VM
          Invoke-Command -ComputerName $env:VM_HOST -Credential $cred -ScriptBlock {
              Write-Host "✅ Connected successfully! VM hostname: $env:COMPUTERNAME"
          }
