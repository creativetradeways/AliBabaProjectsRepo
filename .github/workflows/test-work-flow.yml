name: Test Deployment to Windows VM

on:
  push:
    branches: [ master ]  # Only triggers on master branch
  workflow_dispatch:       # Allows manual run

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy files to Windows VM
        shell: pwsh
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PASS: ${{ secrets.VM_PASS }}
        run: |
          $secpasswd = ConvertTo-SecureString $env:VM_PASS -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($env:VM_USER, $secpasswd)

          # Folder on VM
          $deployFolder = "C:\deployments\myapp"

          # Deploy to VM
          Invoke-Command -ComputerName $env:VM_HOST -Credential $cred -ScriptBlock {
              param($folder)

              # Create folder if it doesn't exist
              if (!(Test-Path $folder)) {
                  New-Item -ItemType Directory -Path $folder
              }

              # Copy files from GitHub runner to VM
              Copy-Item -Path "./*" -Destination $folder -Recurse -Force

              Write-Host "✅ Files deployed to $folder"
          } -ArgumentList $deployFolder
