name: Deploy to Alibaba Windows VM

on:
  push:
    branches:
      - main  # or your branch name

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure TrustedHosts for the VM
      - name: Configure TrustedHosts
        shell: pwsh
        run: |
          Write-Host "Adding VM to TrustedHosts..."
          Set-Item WSMan:\localhost\Client\TrustedHosts -Value "${{ secrets.VM_HOST }}" -Force
          Write-Host "Current TrustedHosts:"
          Get-Item WSMan:\localhost\Client\TrustedHosts

      # Step 3: Run commands on the Alibaba Windows VM
      - name: Execute commands on VM
        shell: pwsh
        run: |
          Write-Host "Connecting to VM..."
          $secpasswd = ConvertTo-SecureString "${{ secrets.VM_PASS }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ("${{ secrets.VM_USER }}", $secpasswd)

          Invoke-Command -ComputerName "${{ secrets.VM_HOST }}" -Credential $cred -ScriptBlock {
              # Replace below with your actual commands
              Get-Process
              Write-Host "Hello from Alibaba VM!"
          } -Port 5985
